<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin - Dona Maria Doces</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <div class="logo-area">
            <h1> Painel Admin</h1>
            <span>Dona Maria Doces</span>
        </div>
        <nav>
            <a href="index.html">🏠 Início</a>
            <a href="admin.html" class="active">⚙️ Painel</a>
        </nav>
    </header>

    <main>
        <h2>Cadastrar Novo Doce</h2>
        <form id="form-doce">
            <input type="hidden" id="doce-id">
            
            <label>Nome do Doce:</label>
            <input type="text" id="nome" required>
            
            <label>Descrição:</label>
            <textarea id="descricao" required></textarea>
            
            <label>Preço (R$):</label>
            <input type="number" id="preco" step="0.01" required>
            
            <label>URL da Imagem:</label>
            <input type="url" id="imagem" placeholder="http://link-da-imagem.com/foto.jpg" required>
            
            <label>Categoria:</label>
            <select id="categoria" required>
                <option value="Bolos">Bolos</option>
                <option value="Brigadeiros">Brigadeiros</option>
                <option value="Tortas">Tortas</option>
                <option value="Outros">Outros</option>
            </select>
            
            <button type="submit" class="btn-admin">Salvar Doce</button>
        </form>

        <h2>Doces Cadastrados</h2>
        <div class="table-container">
            <table>
                <thead>
                    <tr>
                        <th>Nome</th>
                        <th>Categoria</th>
                        <th>Preço</th>
                        <th>Ações</th>
                    </tr>
                </thead>
                <tbody id="tabela-doces">
                </tbody>
            </table>
        </div>
    </main>

    <script src="js/StorageService.js"></script>
    <script src="js/AdminController.js"></script>
</body>
</html>
